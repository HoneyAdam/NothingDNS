# NothingDNS Docker Compose
# ========================
# Single-node deployment for testing and development.
# For production multi-node, use the Helm chart or Kubernetes manifests.

version: "3.8"

services:
  nothingdns:
    image: ghcr.io/nothingdns/nothingdns:latest
    container_name: nothingdns
    restart: unless-stopped

    # Build locally for development
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    # image: nothingdns:latest

    ports:
      # DNS (UDP and TCP)
      - "53:53/udp"
      - "53:53/tcp"
      # DNS over TLS
      - "853:853/tcp"
      # DNS over HTTPS
      - "443:443/tcp"
      # REST API and Dashboard
      - "8080:8080/tcp"
      # Prometheus metrics
      - "9153:9153/tcp"

    environment:
      #TZ: "UTC"
      #NOTHINGDNS_CONFIG: /etc/nothingdns/nothingdns.yaml

    volumes:
      # Configuration file
      - ./config.example.yaml:/etc/nothingdns/nothingdns.yaml:ro
      # Zone files directory
      - ./zones:/etc/nothingdns/zones:ro
      # Data directory (cache, sessions, etc.)
      - nothingdns-data:/data

    # Health check using the API endpoint
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

    # Security: run as non-root user (container default)
    # user: "1000:1000"

    # Network capabilities (required for binding to port 53)
    cap_add:
      - NET_BIND_SERVICE

    # Network mode
    networks:
      - nothingdns-network

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Secondary NothingDNS node for testing cluster
  # nothingdns-node2:
  #   image: ghcr.io/nothingdns/nothingdns:latest
  #   container_name: nothingdns-node2
  #   restart: unless-stopped
  #   ports:
  #     - "53:53/udp"
  #     - "53:53/tcp"
  #     - "853:853/tcp"
  #     - "443:443/tcp"
  #     - "8081:8080/tcp"
  #   environment:
  #     NOTHINGDNS_CONFIG: /etc/nothingdns/nothingdns-node2.yaml
  #   volumes:
  #     - ./config-node2.yaml:/etc/nothingdns/nothingdns-node2.yaml:ro
  #     - ./zones:/etc/nothingdns/zones:ro
  #     - nothingdns-data2:/data
  #   networks:
  #     - nothingdns-network
  #   depends_on:
  #     - nothingdns

# Volumes for persistent data
volumes:
  nothingdns-data:
    driver: local
  # nothingdns-data2:

# Network definition
networks:
  nothingdns-network:
    driver: bridge
    # enable IPv6 (optional)
    # driver: bridge
    # enable_ipv6: true
    # ipam:
    #   driver: default
    #   config:
    #     - subnet: "172.28.0.0/16"