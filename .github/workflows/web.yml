name: Web Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # L-13: `npm ci` is the deterministic install (errors on
        # lockfile/dep mismatch) and is the right command for CI.
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc --noEmit

      - name: Lint
        run: cd web && npm run lint

      - name: Build
        run: cd web && npm run build
        env:
          VITE_API_URL: /api
          VITE_WS_URL: /ws

      - name: Smoke dashboard routes
        run: cd web && npm run smoke

  security:
    runs-on: ubuntu-latest
    needs: web
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # L-13: `npm ci` is the deterministic install (errors on
        # lockfile/dep mismatch) and is the right command for CI.
        run: cd web && npm ci

      - name: Run npm audit
        run: cd web && npm audit --audit-level=moderate

      - name: Run Retire.js
        run: |
          npm install -g retire@latest
          retire --path web/src --ignorefile retire.json

      - name: Run Snyk
        if: env.SNYK_TOKEN != ''
        # M-12: pin to a release commit SHA, not @master. With @master
        # any push to snyk/actions runs against our SNYK_TOKEN and the
        # GitHub OIDC token this workflow holds. Refresh this SHA when
        # Snyk publishes a verified release.
        uses: snyk/actions/node@cdb760004ba9ea4d525f2e043745dfe85bb9077e # v0.4.0
        with:
          args: --file=web/package.json --package-manager=npm --severity-threshold=high

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript
          queries: security-extended

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
