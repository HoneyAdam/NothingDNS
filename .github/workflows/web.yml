name: Web Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # L-13: `npm ci` is the deterministic install (errors on
        # lockfile/dep mismatch) and is the right command for CI.
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc --noEmit

      - name: Lint
        run: cd web && npm run lint

      - name: Build
        run: cd web && npm run build
        env:
          VITE_API_URL: /api
          VITE_WS_URL: /ws

  security:
    runs-on: ubuntu-latest
    needs: web

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # L-13: `npm ci` is the deterministic install (errors on
        # lockfile/dep mismatch) and is the right command for CI.
        run: cd web && npm ci

      - name: Run npm audit
        run: cd web && npm audit --audit-level=moderate

      - name: Run Retire.js
        run: |
          npm install -g retire@latest
          retire --path web/src --ignorefile retire.json

      - name: Run Snyk
        # M-12: pin to a release commit SHA, not @master. With @master
        # any push to snyk/actions runs against our SNYK_TOKEN and the
        # GitHub OIDC token this workflow holds. Refresh this SHA when
        # Snyk publishes a verified release.
        uses: snyk/actions/node@cdb760004ba9ea4d525f2e043745dfe85bb9077e # v0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
