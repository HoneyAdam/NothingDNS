name: Container Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1 # v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@eaefd20f597840d8870070b5b0e1bd33d2fff867 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c887d9748da14dcb42b11cf8bcc773b301ea55b5 # v4.1.0

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870 # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@020b7354dd55a28effcab0f3b19639fe24d3f58b # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51 # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          # L-15: GHA cache is scoped per-branch; mode=max stores all
          # layers including any build-time secrets that may be added
          # in the future. Today there are no --mount=type=secret or
          # build-args carrying secrets, so this is safe. If that
          # changes, drop mode=max for the secret-carrying layers or
          # switch to a private OCI cache (type=registry,ref=…).
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image digest
        if: github.event_name != 'pull_request'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          image_name="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          cosign sign --yes "$REGISTRY/$image_name@$IMAGE_DIGEST"

      - name: Update repo description
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          {
            echo "## Container Image"
            echo ""
            echo "Available tags:"
            echo '```'
            echo "$REGISTRY/$IMAGE_NAME:latest"
            echo "$REGISTRY/$IMAGE_NAME:<tag>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
