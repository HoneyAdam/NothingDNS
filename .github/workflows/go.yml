name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  # L-14: pull-requests permission was granted workflow-wide but no
  # step writes PR comments / labels / status. Removed; restore as a
  # job-scoped grant if a future step actually needs it.

jobs:
  actions:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          actionlint

  go:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          # -l prints files that differ from gofmt; non-zero exit = unformatted files
          # -exec ... + (not xargs) handles non-alphanumeric filenames safely (shellcheck SC2038)
          unformatted=$(find . -name '*.go' -not -path './.git/*' -exec gofmt -l {} + 2>/dev/null)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to format them."
            exit 1
          fi

      - name: Build
        run: go build -o nothingdns ./cmd/nothingdns

      - name: Test
        run: go test ./... -count=1 -short

      - name: Test with Race Detector
        run: go test ./... -count=1 -race

  coverage:
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          while read -r pkg; do
            profile="coverage/$(echo "$pkg" | tr '/' '_').out"
            go test -coverprofile="$profile" "$pkg"
          done < <(go list ./... | grep -v e2e)

      - name: Combine coverage
        run: |
          echo "mode: set" > coverage/all.out
          find coverage -name '*.out' ! -name all.out -exec grep -h -v "^mode:" {} + >> coverage/all.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage/all.out
          flags: unittests
          name: nothingdns-go
          fail_ci_if_error: false
          verbose: true

      - name: Generate coverage report
        run: |
          go tool cover -html=coverage/all.out -o coverage/index.html
          # Create summary
          grep -v "^mode:" coverage/all.out | \
            awk -F: '{print $1, $2}' | \
            while read -r file coverage; do
              echo "$file: $coverage%"
            done > coverage/summary.txt

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/index.html
            coverage/summary.txt
          retention-days: 14

  helm:
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Helm
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/nothingdns \
            --set-string auth.authSecret='AuthSecret-1234567890-ABCDEFGHIJKLMNOPQRSTUVWXYZ' \
            --set-string auth.adminPassword='AdminPassword-1234567890-ABCDE'

      - name: Validate rendered daemon config
        env:
          NOTHINGDNS_AUTH_SECRET: AuthSecret-1234567890-ABCDEFGHIJKLMNOPQRSTUVWXYZ
          NOTHINGDNS_ADMIN_PASSWORD: AdminPassword-1234567890-ABCDE
          NOTHINGDNS_METRICS_AUTH_TOKEN: MetricsToken-1234567890-ABCDEFGHIJKLMNOPQRSTUVWXYZ
          NOTHINGDNS_CLUSTER_ENCRYPTION_KEY: ClusterKey-1234567890-ABCDEFGHIJKLMNOPQRSTUVWXYZ
        run: |
          helm template nothingdns deploy/helm/nothingdns \
            --set-string auth.authSecret="$NOTHINGDNS_AUTH_SECRET" \
            --set-string auth.adminPassword="$NOTHINGDNS_ADMIN_PASSWORD" \
            > /tmp/nothingdns-helm.yaml

          awk '
            found && /^    / { sub(/^    /, ""); print; next }
            found && /^$/ { print; next }
            found { exit }
            /^  nothingdns\.yaml: \|/ { found=1 }
          ' /tmp/nothingdns-helm.yaml > /tmp/nothingdns-helm-config.yaml

          test -s /tmp/nothingdns-helm-config.yaml
          go run ./cmd/nothingdns -config /tmp/nothingdns-helm-config.yaml -validate-config

  security:
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run Go Security Checker
        # M-11: pin tool versions instead of @latest. The security job
        # has `security-events: write` plus the runner has GITHUB_TOKEN
        # in scope; a compromised upstream of either tool would inherit
        # those permissions. Bump these tags via Renovate / Dependabot.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Run Static Analysis
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          go install github.com/kisielk/errcheck@latest
          go install github.com/polyfloyd/go-errorlint@latest
          staticcheck ./...
          errcheck ./...
          go vet ./...

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  e2e:
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Build
        run: |
          go build -o nothingdns ./cmd/nothingdns
          go build -o dnsctl ./cmd/dnsctl

      - name: Run E2E Tests
        run: go test ./internal/e2e/... -v -count=1
        env:
          NOTHINGDNS_E2E_NETWORK: nothingdns-test

      - name: Upload E2E logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/nothingdns-*.log
          retention-days: 7

  fuzz:
    # Short fuzz run on every PR to catch regressions in the
    # attacker-controlled wire-format parsers. Each target is fuzzed
    # for 30s; combined ~4 minutes wall-clock on a CI runner.
    # For deeper coverage (hours / days), run targets locally with
    # `go test ./internal/PKG/ -fuzz=Name -fuzztime=...`.
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ runner.os }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            fuzz-${{ runner.os }}-

      - name: Fuzz protocol parsers
        run: |
          for target in FuzzUnpackMessage FuzzUnpackName FuzzUnpackResourceRecord; do
            go test ./internal/protocol/ -run='^$' -fuzz="^${target}$" -fuzztime=30s
          done

      - name: Fuzz zone parser
        run: go test ./internal/zone/ -run='^$' -fuzz='^FuzzParseZoneFile$' -fuzztime=30s

      - name: Fuzz DSO TLV pipeline
        run: |
          for target in FuzzUnpackTLV FuzzHandleDSORequest; do
            go test ./internal/dso/ -run='^$' -fuzz="^${target}$" -fuzztime=30s
          done

      - name: Fuzz ODoH wire format
        run: |
          for target in FuzzParseODoHMessage FuzzParseConfigContents FuzzDecryptQuery; do
            go test ./internal/odoh/ -run='^$' -fuzz="^${target}$" -fuzztime=30s
          done

      - name: Upload fuzz failures on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-failures
          path: |
            ~/.cache/go-build/fuzz
            internal/*/testdata/fuzz
          retention-days: 14
