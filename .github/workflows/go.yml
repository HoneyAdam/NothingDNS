name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  go:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o nothingdns ./cmd/nothingdns

      - name: Test
        run: go test ./... -count=1 -short

      - name: Test with Race Detector
        run: go test ./... -count=1 -race

  coverage:
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download module cache
        uses: actions/download-artifact@v4
        with:
          name: go-modules
          path: |
            ~/go/pkg/mod
          retention-days: 1

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          for pkg in $(go list ./... | grep -v e2e); do
            go test -coverprofile=coverage/$(echo $pkg | tr '/' '_').out $pkg
          done

      - name: Combine coverage
        run: |
          echo "mode: set" > coverage/all.out
          cat coverage/*.out | grep -v "^mode:" >> coverage/all.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/all.out
          flags: unittests
          name: nothingdns-go
          fail_ci_if_error: false
          verbose: true

      - name: Generate coverage report
        run: |
          go tool cover -html=coverage/all.out -o coverage/index.html
          # Create summary
          grep -v "^mode:" coverage/all.out | \
            awk -F: '{print $1, $2}' | \
            while read file coverage; do
              echo "$file: $coverage%"
            done > coverage/summary.txt

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/index.html
            coverage/summary.txt
          retention-days: 14

  security:
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run Go Security Checker
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Static Analysis
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: go
          queries: security-extended

  e2e:
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Build
        run: |
          go build -o nothingdns ./cmd/nothingdns
          go build -o dnsctl ./cmd/dnsctl

      - name: Run E2E Tests
        run: go test ./internal/e2e/... -v -count=1
        env:
          NOTHINGDNS_E2E_NETWORK: nothingdns-test

      - name: Upload E2E logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/nothingdns-*.log
          retention-days: 7