apiVersion: apps/v1
kind: Deployment
metadata:
  name: nothingdns
  namespace: default
  labels:
    app: nothingdns
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nothingdns
  template:
    metadata:
      labels:
        app: nothingdns
        version: v1.0.0
    spec:
      # Never leak a cluster token into the container filesystem. Using the
      # namespace's default SA — create a dedicated SA if RBAC is layered on.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nothingdns
        image: ghcr.io/nothingdns/nothingdns:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 853
        - name: metrics
          containerPort: 9153
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NOTHINGDNS_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: nothingdns-auth
              key: auth-secret
        - name: NOTHINGDNS_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nothingdns-auth
              key: admin-password
        - name: NOTHINGDNS_METRICS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: nothingdns-auth
              key: metrics-auth-token
        - name: NOTHINGDNS_STORAGE_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: nothingdns-auth
              key: storage-encryption-key
        - name: NOTHINGDNS_CLUSTER_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: nothingdns-auth
              key: cluster-encryption-key
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        # /livez = process alive (always 200 while scheduling); /readyz =
        # ready to serve (503 when all upstreams are down, so a node that can
        # only return SERVFAIL is pulled from the Service). /health is a plain
        # liveness/startup ping. Using /health for readiness would keep an
        # upstream-dead pod in rotation.
        livenessProbe:
          httpGet:
            path: /livez
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - name: config
          mountPath: /etc/nothingdns
          readOnly: true
        - name: zones
          mountPath: /etc/nothingdns/zones
          readOnly: true
        - name: tls
          mountPath: /etc/nothingdns/tls
          readOnly: true
        - name: data
          mountPath: /var/lib/nothingdns
        # readOnlyRootFilesystem: true means the container cannot write to /tmp
        # on the image itself — give it a writable in-memory scratch dir.
        - name: tmp
          mountPath: /tmp
        args:
        - --config
        - /etc/nothingdns/nothingdns.yaml
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_BIND_SERVICE  # only for binding port 53
      volumes:
      - name: config
        configMap:
          name: nothingdns-config
      - name: zones
        persistentVolumeClaim:
          claimName: nothingdns-zones
      - name: tls
        secret:
          secretName: nothingdns-tls
      - name: data
        persistentVolumeClaim:
          claimName: nothingdns-data
      - name: tmp
        emptyDir: {}
