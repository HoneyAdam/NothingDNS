apiVersion: v1
kind: ConfigMap
metadata:
  name: nothingdns-config
  namespace: default
data:
  config.yaml: |
    server:
      port: 53
      bind:
        - 0.0.0.0
      http:
        enabled: true
        bind: "0.0.0.0:8080"
        auth_secret: "${NOTHINGDNS_AUTH_SECRET}"
        users:
          - username: admin
            password: "${NOTHINGDNS_ADMIN_PASSWORD}"
            role: admin
        tls_cert_file: /etc/nothingdns/tls/tls.crt
        tls_key_file: /etc/nothingdns/tls/tls.key
        doh_enabled: true
        doh_path: /dns-query
    upstream:
      servers:
        - 1.1.1.1:53
        - 8.8.8.8:53
      strategy: round_robin
    cache:
      enabled: true
      size: 1000000
      default_ttl: 3600
      max_ttl: 86400
    logging:
      level: info
      format: json
    storage:
      data_dir: /var/lib/nothingdns
      encryption_key: "${NOTHINGDNS_STORAGE_ENCRYPTION_KEY}"
    cluster:
      enabled: true
      gossip_port: 7946
      cache_sync: true
      consensus_mode: swim
      node_id: "${POD_NAME}"
      bind_addr: "${POD_IP}"
      encryption_key: "${NOTHINGDNS_CLUSTER_ENCRYPTION_KEY}"
    metrics:
      enabled: true
      bind: ":9153"
      path: /metrics
      auth_token: "${NOTHINGDNS_METRICS_AUTH_TOKEN}"
    transfer:
      allow_list: []
      require_tsig: false
