{{- if not .Values.auth.existingSecret }}
{{- $needsDefaultAdmin := and .Values.config.http.enabled (not .Values.config.http.users) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nothingdns.fullname" . }}
  labels:
    {{- include "nothingdns.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.config.http.enabled }}
    auth-secret-hash: {{ required "auth.authSecret is required when config.http.enabled=true" .Values.auth.authSecret | sha256sum | quote }}
    {{- end }}
type: Opaque
data:
  {{- if .Values.config.http.enabled }}
  auth-secret: {{ required "auth.authSecret is required when config.http.enabled=true" .Values.auth.authSecret | b64enc | quote }}
  {{- end }}
  {{- if $needsDefaultAdmin }}
  admin-password: {{ required "auth.adminPassword is required unless config.http.users is provided" .Values.auth.adminPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.metrics.enabled }}
  metrics-auth-token: {{ required "auth.metricsAuthToken is required when config.metrics.enabled=true" .Values.auth.metricsAuthToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.cluster.enabled }}
  cluster-encryption-key: {{ required "auth.clusterEncryptionKey is required when config.cluster.enabled=true" .Values.auth.clusterEncryptionKey | b64enc | quote }}
  {{- end }}
{{- end }}
