apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nothingdns.fullname" . }}
  labels:
    {{- include "nothingdns.labels" . | nindent 4 }}
  annotations:
    # Force update when JWT secret changes
    jwt-secret-hash: {{ include "nothingdns.jwtSecret" . | sha256sum | quote }}
type: Opaque
data:
  jwt-secret: {{ include "nothingdns.jwtSecret" . | b64enc | quote }}
  {{- if .Values.config.server.tls.cert_file }}
  # TLS certificates should be mounted from an existing Kubernetes Secret
  # rather than stored in this generic Secret (LOW-033).
  # Example volume mount:
  #   volumes:
  #   - name: tls
  #     secret:
  #       secretName: nothingdns-tls
  {{- end }}
