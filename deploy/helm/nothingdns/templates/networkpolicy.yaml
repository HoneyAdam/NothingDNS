{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nothingdns.fullname" . }}
  labels:
    {{- include "nothingdns.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nothingdns.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # DNS UDP/TCP
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      {{- with .Values.networkPolicy.ingressRules }}
      {{- range . }}
      from:
        {{- toYaml .from | nindent 8 }}
      {{- end }}
      {{- else }}
      from: []
      {{- end }}
    # DoT
    {{- if and .Values.config.server.tls.cert_file .Values.config.server.tls.key_file }}
    - ports:
        - protocol: TCP
          port: {{ .Values.service.dotPort }}
      from: []
    {{- end }}
    # API
    - ports:
        - protocol: TCP
          port: {{ .Values.service.apiPort }}
      from: []
    {{- if .Values.config.metrics.enabled }}
    # Metrics
    - ports:
        - protocol: TCP
          port: {{ .Values.config.metrics.port }}
      from: []
    {{- end }}
  egress:
    # DNS upstream (UDP/TCP port 53) and HTTPS for blocklists/DoH
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
    # Allow cluster-internal communication for gossip/Raft
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 7946
{{- end }}
