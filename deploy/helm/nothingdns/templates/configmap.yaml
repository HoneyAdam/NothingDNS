apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nothingdns.fullname" . }}-config
  labels:
    {{- include "nothingdns.labels" . | nindent 4 }}
data:
  nothingdns.yaml: |
    server:
      bind: {{ .Values.config.server.bind | toYaml | nindent 8 }}
      port: {{ .Values.config.server.port }}
      udp_workers: {{ .Values.config.server.udp_workers }}
      tcp_workers: {{ .Values.config.server.tcp_workers }}
      {{- if .Values.config.server.tls.cert_file }}
      tls:
        cert_file: {{ .Values.config.server.tls.cert_file }}
        key_file: {{ .Values.config.server.tls.key_file }}
      {{- end }}
      {{- if .Values.config.xot.enabled }}
      xot:
        enabled: {{ .Values.config.xot.enabled }}
        cert_file: {{ .Values.config.xot.cert_file }}
        key_file: {{ .Values.config.xot.key_file }}
        {{- if .Values.config.xot.ca_file }}
        ca_file: {{ .Values.config.xot.ca_file }}
        {{- end }}
        bind: {{ .Values.config.xot.bind | quote }}
        min_tls_version: {{ .Values.config.xot.min_tls_version }}
      {{- end }}

      http:
        enabled: {{ .Values.config.http.enabled }}
        bind: {{ .Values.config.http.bind | quote }}
        auth_secret: "${NOTHINGDNS_AUTH_SECRET}"
        allowed_origins: {{ .Values.config.http.allowed_origins | toYaml | nindent 10 }}
        {{- if .Values.config.http.users }}
        users: {{ .Values.config.http.users | toYaml | nindent 10 }}
        {{- else }}
        users:
          - username: admin
            password: "${NOTHINGDNS_ADMIN_PASSWORD}"
            role: admin
        {{- end }}
        {{- if .Values.config.http.tls_cert_file }}
        tls_cert_file: {{ .Values.config.http.tls_cert_file | quote }}
        tls_key_file: {{ .Values.config.http.tls_key_file | quote }}
        {{- end }}
        doh_enabled: {{ .Values.config.http.doh_enabled }}
        doh_path: {{ .Values.config.http.doh_path }}

    logging:
      level: {{ .Values.config.logging.level }}
      format: {{ .Values.config.logging.format }}
      output: {{ .Values.config.logging.output }}

    cache:
      enabled: {{ .Values.config.cache.enabled }}
      size: {{ .Values.config.cache.size }}
      ttl: {{ .Values.config.cache.ttl }}
      negative_ttl: {{ .Values.config.cache.negative_ttl }}
      stale_ttl: {{ .Values.config.cache.stale_ttl }}
      prefetch: {{ .Values.config.cache.prefetch }}
      prefetch_threshold: {{ .Values.config.cache.prefetch_threshold }}

    {{- if .Values.config.dns64.enabled }}
    dns64:
      enabled: {{ .Values.config.dns64.enabled }}
      prefix: {{ .Values.config.dns64.prefix }}
    {{- end }}

    upstream:
      servers: {{ .Values.config.upstream.servers | toYaml | nindent 8 }}
      timeout: {{ .Values.config.upstream.timeout }}
      attempts: {{ .Values.config.upstream.attempts }}
      health_check_interval: {{ .Values.config.upstream.health_check_interval }}

    dnssec:
      enabled: {{ .Values.config.dnssec.enabled }}
      validation: {{ .Values.config.dnssec.validation }}
      {{- if .Values.config.dnssec.trust_anchor_file }}
      trust_anchor_file: {{ .Values.config.dnssec.trust_anchor_file }}
      {{- end }}

    {{- if .Values.config.cluster.enabled }}
    cluster:
      enabled: {{ .Values.config.cluster.enabled }}
      node_id: {{ .Values.config.cluster.node_id | default "${POD_NAME}" | quote }}
      bind_addr: {{ .Values.config.cluster.bind_addr | default "${POD_IP}" | quote }}
      bind_port: {{ .Values.config.cluster.bind_port }}
      encryption_key: "${NOTHINGDNS_CLUSTER_ENCRYPTION_KEY}"
      peers: {{ .Values.config.cluster.peers | toYaml | nindent 8 }}
    {{- end }}

    {{- if .Values.config.rpz.enabled }}
    rpz:
      enabled: {{ .Values.config.rpz.enabled }}
      zones: {{ .Values.config.rpz.zones | toYaml | nindent 8 }}
    {{- end }}

    {{- if .Values.config.blocklist.enabled }}
    blocklist:
      enabled: {{ .Values.config.blocklist.enabled }}
      files: {{ .Values.config.blocklist.files | toYaml | nindent 8 }}
      urls: {{ .Values.config.blocklist.urls | toYaml | nindent 8 }}
    {{- end }}

    {{- if .Values.config.geoip.enabled }}
    geoip:
      enabled: {{ .Values.config.geoip.enabled }}
      database_path: {{ .Values.config.geoip.database_path }}
    {{- end }}

    {{- if .Values.config.slave_zones }}
    slave_zones: {{ .Values.config.slave_zones | toYaml | nindent 6 }}
    {{- end }}

    {{- if or .Values.config.transfer.allow_list .Values.config.transfer.require_tsig }}
    transfer:
      allow_list: {{ .Values.config.transfer.allow_list | toYaml | nindent 8 }}
      require_tsig: {{ .Values.config.transfer.require_tsig }}
    {{- end }}

    metrics:
      enabled: {{ .Values.config.metrics.enabled }}
      bind: ":{{ .Values.config.metrics.port }}"
      path: {{ .Values.config.metrics.path }}
      auth_token: "${NOTHINGDNS_METRICS_AUTH_TOKEN}"

    {{- if .Values.config.tracing.enabled }}
    tracing:
      enabled: {{ .Values.config.tracing.enabled }}
      endpoint: {{ .Values.config.tracing.endpoint }}
      sample_rate: {{ .Values.config.tracing.sample_rate }}
    {{- end }}

    zones: {{ .Values.config.zones | default (list) | toYaml | nindent 6 }}
