# Default values for nothingdns.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nothingdns/nothingdns
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 65534  # nobody user for scratch container

# Container security context
securityContext:
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE  # Required to bind DNS port 53 (VULN-042)
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534  # nobody

# Service configuration.
# Default to ClusterIP so a naive `helm install` does not publish an open
# DNS resolver to the internet — flip to LoadBalancer explicitly once the
# operator has reviewed DDoS-amplification exposure (VULN-024).
service:
  type: ClusterIP
  annotations: {}
  # DNS UDP port
  udpPort: 53
  # DNS TCP port
  tcpPort: 53
  # DNS over TLS port
  dotPort: 853
  # API/WebSocket port
  apiPort: 8080

# Secret material used by the generated chart Secret. Set existingSecret to
# reference a pre-created Secret with these keys instead:
#   auth-secret, admin-password, metrics-auth-token, cluster-encryption-key.
auth:
  existingSecret: ""
  authSecret: ""
  adminPassword: ""
  metricsAuthToken: ""
  clusterEncryptionKey: ""

# Ingress configuration for DoH/API
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: dns.example.com
      paths:
        - path: /dns-query
          pathType: Prefix
          servicePort: 8080
        - path: /api
          pathType: Prefix
          servicePort: 8080
        - path: /ws
          pathType: Prefix
          servicePort: 8080
  tls:
    - secretName: nothingdns-tls
      hosts:
        - dns.example.com

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget
pdb:
  enabled: false
  minAvailable: 1

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - nothingdns
          topologyKey: kubernetes.io/hostname

# Topology spread constraints
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: nothingdns

# Persistence for zone files and data
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# Additional volumes
extraVolumes: []
# - name: custom-certs
#   secret:
#     secretName: custom-tls-certs

# Additional volume mounts
extraVolumeMounts: []
# - name: custom-certs
#   mountPath: /etc/nothingdns/certs
#   readOnly: true

# Configuration
config:
  # Server configuration
  server:
    bind:
      - 0.0.0.0
      - "::"
    port: 53
    udp_workers: 0  # 0 = auto (NumCPU * 4)
    tcp_workers: 0  # 0 = auto (NumCPU * 2)
    # TLS configuration for DoT and DoH
    tls:
      cert_file: ""
      key_file: ""

  # HTTP API / Dashboard / DoH configuration
  http:
    enabled: true
    bind: "0.0.0.0:8080"
    # CORS origins
    allowed_origins:
      - "http://localhost:3000"
      - "https://localhost:3000"
    # Authentication
    auth_secret: ""
    users: []
    # - username: admin
    #   password: ""
    #   role: admin
    tls_cert_file: ""
    tls_key_file: ""
    doh_enabled: false
    doh_path: /dns-query

  # Logging configuration
  logging:
    level: info  # debug, info, warn, error
    format: json  # json, text
    output: stdout

  # Cache configuration
  cache:
    enabled: true
    size: 10000
    ttl: 300
    negative_ttl: 60
    stale_ttl: 86400
    prefetch: true
    prefetch_threshold: 3

  # DNS64 configuration
  dns64:
    enabled: false
    prefix: "64:ff9b::/96"

  # Upstream DNS servers
  upstream:
    servers:
      - "1.1.1.1:53"
      - "8.8.8.8:53"
    timeout: 5s
    attempts: 3
    health_check_interval: 30s

  # DNSSEC configuration
  dnssec:
    enabled: true
    validation: true
    trust_anchor_file: ""

  # Cluster configuration (for HA mode)
  cluster:
    enabled: false
    node_id: ""  # Auto-generated from pod name if empty
    bind_addr: "0.0.0.0"
    bind_port: 7946
    peers: []
    # consensus_mode: raft  # raft or gossip

  # RPZ (Response Policy Zones)
  rpz:
    enabled: false
    zones: []
    # - name: "rpz.example.com"
    #   url: "https://example.com/rpz.zone"
    #   file: "/var/lib/nothingdns/rpz.zone"

  # Blocklists
  blocklist:
    enabled: false
    files: []
    urls: []
    # urls:
    #   - "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"

  # GeoIP configuration
  geoip:
    enabled: false
    database_path: ""
    # database_path: "/var/lib/nothingdns/GeoLite2-City.mmdb"

  # XoT (Zone Transfer over TLS)
  xot:
    enabled: false
    bind: ":853"
    cert_file: ""
    key_file: ""
    ca_file: ""
    min_tls_version: 12

  # Secondary zone transfer configuration (AXFR/IXFR)
  slave_zones: []
  # slave_zones:
  #   - zone_name: "example.com."
  #     masters:
  #       - "192.0.2.1:53"
  #     transfer_type: ixfr
  #     timeout: 30s
  #     retry_interval: 5m
  #     max_retries: 3

  # Serving zone transfers to secondary servers is deny-by-default.
  transfer:
    allow_list: []
    require_tsig: false
    # allow_list:
    #   - "192.0.2.0/24"
    #   - "2001:db8::/32"

  # Metrics and monitoring
  metrics:
    enabled: false
    port: 9090
    path: /metrics
    auth_token: ""

  # OpenTelemetry tracing
  tracing:
    enabled: false
    endpoint: ""
    # endpoint: "http://otel-collector:4317"
    sample_rate: 0.1

  # Authoritative zone files to load
  zones: []
  # zones:
  #   - "/var/lib/nothingdns/zones/example.com.zone"

# Monitoring
monitoring:
  # Prometheus Operator ServiceMonitor
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

  # Prometheus Operator PrometheusRule for alerts
  prometheusRule:
    enabled: false
    namespace: ""
    labels: {}
    rules: []

# Network policies.
# Defaults to on so ingress is restricted to the declared rules below
# instead of permitting any pod in the cluster to reach the DNS/API
# ports (VULN-024).
networkPolicy:
  enabled: true
  ingressRules:
    - from: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 853
        - protocol: TCP
          port: 8080

# PodMonitor for Prometheus scraping
podMonitor:
  enabled: false
  namespace: ""
  interval: 30s
